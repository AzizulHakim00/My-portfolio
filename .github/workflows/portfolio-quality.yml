name: Portfolio Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate JavaScript syntax
        run: |
          node --check src/main/resources/static/assets/js/app.js
          node --check src/main/resources/static/assets/js/project-details.js
          node --check src/main/resources/static/assets/js/runtime-projects.js
          node --check src/main/resources/static/assets/js/upgrade.js
          node --check src/main/resources/static/assets/js/v3-foundation.js
          node --check src/main/resources/static/assets/js/v3-live.js
          node --check src/main/resources/static/assets/js/v3-research.js
          node --check src/main/resources/static/assets/js/v3-contact.js
          node --check src/main/resources/static/assets/js/case-study-data.js
          node --check src/main/resources/static/assets/js/case-study.js

      - name: Run Spring Boot tests
        id: gradle
        continue-on-error: true
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew clean test --console=plain --stacktrace > gradle-test.log 2>&1

      - name: Upload Gradle diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-log
          path: gradle-test.log
          retention-days: 7

      - name: Show Gradle result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.gradle.outcome }}" = "failure" ]; then
            echo "::group::Gradle failure summary"
            grep -n -E -A40 -B15 "FAILURE:|What went wrong:|error:|Exception|Could not resolve|Could not compile" gradle-test.log | tail -n 220 || tail -n 220 gradle-test.log
            echo "::endgroup::"
            exit 1
          fi
          tail -n 50 gradle-test.log

  lighthouse:
    if: github.event_name != 'pull_request'
    needs: build-and-syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Lighthouse CI
        run: npm install --global @lhci/cli@0.15.x

      - name: Audit deployed portfolio
        run: lhci autorun